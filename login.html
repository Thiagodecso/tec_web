<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeppLog - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
    <a href="catalogo.html" class="auth-logo-link">
        <div class="auth-logo-icon">⚙</div>
        <span class="auth-logo-name">KeppLog</span>
    </a>
</div>

        <h1 class="auth-title">Inventário Laboratorial</h1>
        <p class="auth-subtitle">Entre para acessar o catálogo de componentes</p>

        <form onsubmit="window.location.href='catalogo.html'; return false;">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    <span class="input-icon">···</span>
                </div>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <div class="input-wrap">
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                    <span class="input-icon">···</span>
                </div>
            </div>

            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <p class="auth-alt">Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>

        <div class="auth-hint">💡 Dica: Use email com "admin" para acesso de administrador</div>
    </div>
</body>
</html>
