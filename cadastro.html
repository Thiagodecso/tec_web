<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeppLog - Criar Conta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">⚙</div>
            <span class="auth-logo-name">KeppLog</span>
        </div>

        <h1 class="auth-title">Criar Conta</h1>
        <p class="auth-subtitle">Cadastre-se para acessar o sistema</p>

        <form onsubmit="window.location.href='login.html'; return false;">
            <div class="form-group">
                <label for="nome">Nome completo</label>
                <div class="input-wrap">
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    <span class="input-icon">···</span>
                </div>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <div class="input-wrap">
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                    <span class="input-icon">···</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmar">Confirmar senha</label>
                <div class="input-wrap">
                    <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required>
                    <span class="input-icon">···</span>
                </div>
            </div>

            <button type="submit" class="btn-primary">Criar conta</button>
        </form>

        <p class="auth-alt">Já tem uma conta? <a href="login.html">Faça login</a></p>
    </div>
</body>
</html>
