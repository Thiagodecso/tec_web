<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
      <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #f4f7fc;
      color: #1a2634;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
    }

    /* cabeçalho */
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      border-bottom: 2px solid #d0ddee;
      padding-bottom: 1.5rem;
    }

    .header h1 {
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header h1 i {
      color: #2a6f97;
      font-size: 2rem;
    }

    .badge-git {
      background: #1e2a3a;
      color: #f0f6ff;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .badge-git i {
      font-size: 1.2rem;
      color: #f0f6ff;
    }

    .badge-git a {
      color: #9fc9ff;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .badge-git a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    /* barra de filtros / categorias */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 2rem;
      background: #ffffff;
      padding: 1rem 1.8rem;
      border-radius: 60px;
      box-shadow: 0 6px 14px rgba(0, 20, 40, 0.06);
      margin-bottom: 2.8rem;
      align-items: center;
      justify-content: space-between;
    }

    .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 1.2rem;
    }

    .filter-tabs span {
      font-weight: 500;
      color: #2d4056;
      cursor: default;
      padding: 0.3rem 0;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }

    .filter-tabs span.active {
      border-bottom-color: #2a6f97;
      color: #0b2b3f;
    }

    .filter-tabs span i {
      margin-right: 6px;
      color: #3d6b8f;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #eef3fa;
      padding: 0.3rem 1rem 0.3rem 1.5rem;
      border-radius: 40px;
    }

    .search-box i {
      color: #5b7a9a;
    }

    .search-box input {
      border: none;
      background: transparent;
      padding: 0.6rem 0;
      font-size: 0.95rem;
      outline: none;
      min-width: 160px;
      color: #1a2a3a;
    }

    .search-box input::placeholder {
      color: #7a93af;
      font-weight: 300;
    }

    /* grade de componentes */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem 1.8rem;
      margin-top: 0.5rem;
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 10px 28px rgba(0, 20, 40, 0.06);
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e7edf5;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(18, 52, 87, 0.10);
      border-color: #c4d5e8;
    }

    .card-img {
      background: #f0f5fe;
      padding: 1.8rem 1rem 1rem 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 160px;
      border-bottom: 1px solid #eef2f8;
    }

    .card-img img {
      max-width: 100%;
      height: auto;
      max-height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.04));
      transition: 0.2s;
    }

    .card:hover .card-img img {
      transform: scale(1.02);
    }

    .card-body {
      padding: 1.4rem 1.2rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: -0.3px;
      color: #142433;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .card-title i {
      color: #2f6d96;
      font-size: 0.95rem;
    }

    .card-sub {
      font-size: 0.8rem;
      color: #4a6a88;
      background: #eaf1fa;
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      align-self: flex-start;
      margin: 0.3rem 0 0.8rem 0;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .card-desc {
      font-size: 0.9rem;
      color: #2f4057;
      line-height: 1.5;
      margin-bottom: 0.6rem;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.6rem;
      border-top: 1px solid #e3ebf5;
      padding-top: 0.8rem;
    }

    .card-footer .code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      background: #eef3fa;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      color: #1c3f5c;
    }

    .card-footer .tag {
      background: #d6e3f5;
      color: #10344e;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* mensagem de dados via github */
    .data-source {
      text-align: center;
      margin: 3rem 0 1rem;
      color: #3d5f7a;
      font-size: 0.9rem;
      border-top: 1px solid #d7e1ed;
      padding-top: 2rem;
    }

    .data-source i {
      margin: 0 6px;
      color: #2a6f97;
    }

    .data-source a {
      color: #1c5a7a;
      text-decoration: none;
      font-weight: 500;
    }

    .data-source a:hover {
      text-decoration: underline;
    }


    
  </style>
</head>

<body>
<div class="container">
        <h1>Catálogo</h1>
     <div class="header">
      <h1><i class="fas fa-microchip"></i> Catálogo keeplog</h1>
    
        </div>
    </div>    

    <div class="filter-bar">
        <div class="filter-tabs"></div>
    
          
    </div>

    <div class="search-box">
        <i class=""></i>
         <input type="text" id="searchInput" placeholder="Pesquisar produtos...">
               
    </div>

</html>
